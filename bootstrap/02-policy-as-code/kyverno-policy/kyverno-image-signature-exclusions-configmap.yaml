apiVersion: v1
kind: ConfigMap
metadata:
  name: image-signature-exclusions
  namespace: kyverno
  labels:
    app.kubernetes.io/managed-by: kyverno-policy
    app.kubernetes.io/part-of: supply-chain-security
data:
  # Glob patterns for images exempt from cosign keyless signature verification.
  # Keep this list in sync with skipImageReferences in kyverno-verify-image-signatures.yaml.
  # Changes here require a corresponding update to the ClusterPolicy.
  images: |
    registry.k8s.io/pause:*
    docker.io/library/nginx:*
    docker.io/library/busybox:*
