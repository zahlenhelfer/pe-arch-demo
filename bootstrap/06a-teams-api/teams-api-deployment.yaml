---
# Namespace for the API
apiVersion: v1
kind: Namespace
metadata:
  name: engineering-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teams-api
  namespace: engineering-platform
  labels:
    app: teams-api
  annotations:
    commit-sha: 8b514a1cb354
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teams-api
  template:
    metadata:
      labels:
        app: teams-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: teams-api
          image: ghcr.io/zahlenhelfer/teams-api:1.1.3
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: teams-api-service
  namespace: engineering-platform
spec:
  selector:
    app: teams-api
  ports:
    - protocol: TCP
      port: 4200
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teams-api-ingress
  namespace: engineering-platform
spec:
  rules:
    - host: teams-api.172.18.255.254.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: teams-api-service
                port:
                  number: 4200
