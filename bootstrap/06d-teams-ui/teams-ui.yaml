---
# Namespace for the API
apiVersion: v1
kind: Namespace
metadata:
  name: engineering-platform
---
# k8s/teams-ui-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teams-ui
  namespace: engineering-platform
  labels:
    app: teams-ui
    component: frontend
  annotations:
    commit-sha: 8b514a1cb354
spec:
  replicas: 3
  selector:
    matchLabels:
      app: teams-ui
  template:
    metadata:
      labels:
        app: teams-ui
        component: frontend
    spec:
      containers:
        - name: teams-ui
          image: ghcr.io/zahlenhelfer/teams-ui:1.3.0
          ports:
            - containerPort: 80
          env:
            - name: KEYCLOAK_URL
              value: "http://platform-auth.172.18.255.254.sslip.io"
            - name: KEYCLOAK_REALM
              value: "teams"
            - name: KEYCLOAK_CLIENT_ID
              value: "teams-ui"
            - name: API_URL
              value: "http://teams-api.172.18.255.254.sslip.io"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
# k8s/teams-ui-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: teams-ui-service
  namespace: engineering-platform
  labels:
    app: teams-ui
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: teams-ui
---
# k8s/teams-ui-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teams-ui-ingress
  namespace: engineering-platform
spec:
  ingressClassName: traefik
  rules:
    - host: teams-ui.172.18.255.254.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: teams-ui-service
                port:
                  number: 80
